# =============================================================================
# Alembic Configuration
# =============================================================================
# DB URL is resolved at runtime from environment via alembic/env.py — the
# sqlalchemy.url here is intentionally blank so secrets never live in source.
# =============================================================================

[alembic]
# Path to migration scripts relative to this file
script_location = alembic

# Template for new migration filenames (%%(rev)s = revision id)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Add the project root to sys.path so `import src.*` works inside env.py
prepend_sys_path = .

# Timezone for revision timestamps
timezone = UTC

# Truncate slug to this many characters
truncate_slug_length = 40

# DB URL — populated from env vars in env.py (leave blank here)
sqlalchemy.url =

# Use 'transaction_per_migration' so a failed migration doesn't poison a batch
transaction_per_migration = true

# Compare column types when autogenerating
compare_type = true
compare_server_default = true

# -----------------------------------------------------------------------------
# Post-generation hooks
# -----------------------------------------------------------------------------
[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
